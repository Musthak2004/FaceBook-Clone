{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Create Group — FaceClone{% endblock title %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="h3 mb-3">
            <i class="bi bi-plus-circle"></i> Create a Group
        </h1>
        <div class="card shadow-sm">
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid gap-2 mt-3">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-people"></i> Create Group
                        </button>
                        <a href="{% url 'groups:list' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
