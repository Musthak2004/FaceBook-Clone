{% extends "base.html" %}
{% load static %}

{% block title %}Create Group — SocialNet{% endblock %}

{% block content %}
<div class="main-wrapper">
  <div class="main-content" style="max-width:500px;">
    <div class="post-detail-card">
      <h2>Create Group</h2>
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
          <label class="form-label">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
          <p class="text-danger" style="font-size:var(--font-size-sm);">{{ field.errors.0 }}</p>
          {% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary btn-block">Create Group</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
