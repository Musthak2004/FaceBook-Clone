{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Add Story - FaceBook Clone{% endblock %}
{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-body">
          <h1 class="card-title h3 mb-4">Add a Story</h1>
          <p class="text-muted mb-4">Your story will be visible to friends for 24 hours.</p>
          <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form|crispy }}
            <div class="d-flex gap-2 mt-4">
              <button type="submit" class="btn btn-primary">
                <i class="bi bi-upload"></i> Share Story
              </button>
              <a href="{% url 'stories:list' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
