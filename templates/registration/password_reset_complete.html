{% extends "base.html" %}

{% block title %}Password Reset Complete{% endblock title %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto text-center">
        <div class="card shadow-sm mt-5">
            <div class="card-body py-5">
                <i class="bi bi-check-circle-fill text-success display-1"></i>
                <h4 class="mt-3">Password Reset Complete!</h4>
                <p class="text-muted">Your password has been set. You can now log in.</p>
                <a href="{% url 'login' %}" class="btn btn-success">Log In</a>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
