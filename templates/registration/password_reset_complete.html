{% extends "base.html" %}
{% load static %}

{% block title %}Password Reset Complete — SocialNet{% endblock %}

{% block content %}
<div class="auth-page-bg">
  <div class="auth-card-social">
    <div class="text-center">
      <div class="w-14 h-14 rounded-2xl bg-green-100 dark:bg-green-900/30 flex items-center justify-center mx-auto mb-4">
        <svg class="w-7 h-7 text-green-600 dark:text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-[var(--text-primary)] mb-2">Password Reset Complete</h1>
      <p class="text-sm text-[var(--text-secondary)] mb-8">Your password has been successfully reset. You can now log in with your new password.</p>
      <a href="{% url 'login' %}" class="btn-brand w-full justify-center py-3">Log In to SocialNet</a>
    </div>
  </div>
</div>
{% endblock %}
