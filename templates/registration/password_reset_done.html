{% extends "base.html" %}

{% block title %}Email Sent{% endblock title %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto text-center">
        <div class="card shadow-sm mt-5">
            <div class="card-body py-5">
                <i class="bi bi-envelope-check text-info display-1"></i>
                <h4 class="mt-3">Check Your Email</h4>
                <p class="text-muted">We've sent instructions for resetting your password.</p>
                <a href="{% url 'login' %}" class="btn btn-primary">Back to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
