{% extends "base.html" %}
{% load static %}

{% block title %}Password Changed — SocialNet{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 py-12 page-enter">
  <div class="card-social-static p-8 text-center">
    <div class="w-16 h-16 rounded-2xl bg-green-100 dark:bg-green-900/30 flex items-center justify-center mx-auto mb-4">
      <svg class="w-8 h-8 text-green-600 dark:text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
    </div>
    <h1 class="text-2xl font-bold text-[var(--text-primary)] mb-2">Password Changed</h1>
    <p class="text-[var(--text-secondary)] mb-8">Your password has been changed successfully.</p>
    <a href="{% url 'core:home' %}" class="btn-brand">Back to Home</a>
  </div>
</div>
{% endblock %}
