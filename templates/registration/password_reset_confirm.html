{% extends "base.html" %}

{% block title %}Set New Password — SocialNet{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <h2>Set New Password</h2>
      <form method="post">
        {% csrf_token %}
        {% if form.errors %}
        <div class="auth-errors">
          <ul>
            {% for field in form %}
              {% for error in field.errors %}
                <li>{{ error }}</li>
              {% endfor %}
            {% endfor %}
          </ul>
        </div>
        {% endif %}
        <div class="form-group">
          <input type="password" name="new_password1" class="form-input" placeholder="New password" required>
        </div>
        <div class="form-group">
          <input type="password" name="new_password2" class="form-input" placeholder="Confirm new password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Set Password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
