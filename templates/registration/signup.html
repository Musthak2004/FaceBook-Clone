{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Sign Up{% endblock title %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card shadow-sm mt-5">
            <div class="card-header bg-success text-white text-center">
                <h4 class="mb-0"><i class="bi bi-person-plus"></i> Sign Up</h4>
                <small>Join the community</small>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-success w-100 mt-2">Sign Up</button>
                </form>
                <hr>
                <div class="text-center">
                    <small>Already have an account? <a href="{% url 'login' %}">Log In</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}

{% block extra_css %}
<style>
    body { background-color: #f0f2f5; }
</style>
{% endblock extra_css %}
