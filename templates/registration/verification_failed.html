{% extends 'base.html' %}

{% block title %}Verification Failed - FaceBook Clone{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5 text-center">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="mb-3 text-danger">Verification Failed</h2>
                <p class="text-muted">{{ error }}</p>
                <p>Please try signing up again or contact support.</p>
                <a href="{% url 'accounts:signup' %}" class="btn btn-primary">Sign Up Again</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
