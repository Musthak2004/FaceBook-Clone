{% extends "base.html" %}

{% block title %}Delete Event - FaceBook Clone{% endblock %}

{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-body text-center">
          <i class="bi bi-exclamation-triangle display-3 text-danger mb-3 d-block"></i>
          <h3 class="card-title">Delete Event?</h3>
          <p class="text-muted">
            Are you sure you want to delete <strong>"{{ event.title }}"</strong>?
            This action cannot be undone.
          </p>
          <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-2 justify-content-center">
              <button type="submit" class="btn btn-danger">
                <i class="bi bi-trash"></i> Delete
              </button>
              <a href="{% url 'events:detail' event.pk %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
