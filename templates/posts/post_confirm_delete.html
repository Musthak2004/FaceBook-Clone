{% extends "base.html" %}

{% block title %}Delete Post{% endblock title %}

{% block content %}
<div class="row">
    <div class="col-lg-6 mx-auto">
        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0"><i class="bi bi-exclamation-triangle"></i> Delete Post</h5>
            </div>
            <div class="card-body text-center">
                <p>Are you sure you want to delete this post?</p>
                <div class="bg-light rounded p-3 mb-3">
                    <p class="mb-0 text-muted">{{ post.content|truncatewords:30 }}</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2">
                        <a href="javascript:history.back()" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> Confirm Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
