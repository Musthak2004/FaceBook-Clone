{% extends "base.html" %}

{% block title %}Delete Post — SocialNet{% endblock %}

{% block content %}
<div class="main-wrapper">
  <div class="main-content" style="max-width:500px;">
    <div class="card text-center">
      <h2>Delete Post</h2>
      <p class="text-secondary">Are you sure you want to delete this post? This action cannot be undone.</p>
      <div class="card mt-4" style="text-align:left;">
        <p>{{ post.content|truncatewords:30 }}</p>
      </div>
      <form method="post" class="mt-4">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger btn-lg">Delete</button>
        <a href="{% url 'posts:post_detail' pk=post.pk %}" class="btn btn-ghost btn-lg">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
