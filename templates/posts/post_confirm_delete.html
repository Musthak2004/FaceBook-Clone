{% extends "base.html" %}
{% load static %}

{% block title %}Delete Post — SocialNet{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 py-12 page-enter">
  <div class="card-social-static p-6 text-center">
    <div class="w-16 h-16 rounded-2xl bg-red-100 dark:bg-red-900/30 flex items-center justify-center mx-auto mb-4">
      <svg class="w-8 h-8 text-red-600 dark:text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
      </svg>
    </div>
    <h1 class="text-xl font-bold text-[var(--text-primary)] mb-2">Delete Post</h1>
    <p class="text-sm text-[var(--text-secondary)] mb-6">Are you sure you want to delete this post? This action cannot be undone.</p>

    <div class="p-4 rounded-xl bg-[var(--surface-secondary)] border border-[var(--border-light)] mb-6 text-left">
      <p class="text-sm text-[var(--text-primary)]">{{ post.content|truncatewords:30 }}</p>
    </div>

    <form method="post" class="flex items-center justify-center gap-3">
      {% csrf_token %}
      <button type="submit" class="btn-danger-social">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
        Delete
      </button>
      <a href="{% url 'posts:post_detail' pk=post.pk %}" class="btn-ghost-social border border-[var(--border-light)]">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
