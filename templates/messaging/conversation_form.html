{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}New Message — FaceClone{% endblock title %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="h3 mb-3">
            <i class="bi bi-plus-circle"></i> New Conversation
        </h1>
        <div class="card shadow-sm">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid gap-2 mt-3">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-chat-dots"></i> Start Conversation
                        </button>
                        <a href="{% url 'messaging:list' %}" class="btn btn-outline-secondary">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
