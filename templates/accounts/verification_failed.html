{% extends "base.html" %}

{% block title %}Verification Failed — SocialNet{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-container">
    <div class="auth-card text-center">
      <h2>❌ Verification Failed</h2>
      <p>{{ error|default:"The verification link is invalid or has expired." }}</p>
      <a href="{% url 'accounts:resend_verification' %}" class="btn btn-primary mt-4">Resend Verification Email</a>
    </div>
  </div>
</div>
{% endblock %}
