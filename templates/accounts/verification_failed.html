{% extends "base.html" %}

{% block title %}Verification Failed — SocialNet{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4 page-enter">
  <div class="card-social-static p-8 text-center max-w-md w-full">
    <div class="w-16 h-16 rounded-2xl bg-red-100 dark:bg-red-900/30 flex items-center justify-center mx-auto mb-4">
      <svg class="w-8 h-8 text-red-600 dark:text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
      </svg>
    </div>
    <h1 class="text-xl font-bold text-[var(--text-primary)] mb-2">Verification Failed</h1>
    <p class="text-sm text-[var(--text-secondary)] mb-6">{{ error|default:"The verification link is invalid or has expired." }}</p>
    <a href="{% url 'accounts:resend_verification' %}" class="btn-brand inline-flex items-center justify-center px-6">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      Resend Verification Email
    </a>
  </div>
</div>
{% endblock %}
