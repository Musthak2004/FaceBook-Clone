{% extends "base.html" %}

{% block title %}Account Settings — SocialNet{% endblock %}

{% block content %}
<div class="main-wrapper">
  <div class="main-content" style="max-width:600px;">
    <div class="card mb-4">
      <h2>Account Settings</h2>
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Username</label>
          {{ form.username }}
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          {{ form.email }}
        </div>
        <div class="form-group">
          <label class="form-label">First Name</label>
          {{ form.first_name }}
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          {{ form.last_name }}
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </form>
    </div>

    <div class="card">
      <h3>Password</h3>
      <p class="text-secondary">Want to change your password?</p>
      <a href="{% url 'password_change' %}" class="btn btn-ghost">Change Password</a>
    </div>
  </div>
</div>
{% endblock %}
