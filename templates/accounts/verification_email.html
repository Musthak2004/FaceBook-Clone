<!DOCTYPE html>
<html>
<body style="font-family: Arial, sans-serif; padding: 24px; max-width: 480px; margin: 0 auto;">
  <div style="background: #1877F2; color: white; padding: 16px; text-align: center; border-radius: 8px 8px 0 0;">
    <h1 style="margin: 0; font-size: 24px;">SocialNet</h1>
  </div>
  <div style="background: #fff; padding: 24px; border: 1px solid #e4e6eb; border-radius: 0 0 8px 8px;">
    <h2>Verify your email</h2>
    <p>Hi <strong>{{ user.username }}</strong>,</p>
    <p>Thanks for signing up! Please verify your email address by clicking the button below:</p>
    <p style="text-align: center; margin: 24px 0;">
      <a href="{{ verify_url }}" style="display: inline-block; background: #1877F2; color: white; padding: 12px 32px; text-decoration: none; border-radius: 6px; font-weight: 600;">
        Verify Email
      </a>
    </p>
    <p style="color: #65676b; font-size: 13px;">This link expires in 24 hours.</p>
    <p style="color: #65676b; font-size: 13px;">If you didn't create an account, you can safely ignore this email.</p>
  </div>
</body>
</html>
