{% comment %}
  Post stats bar (like count + comment count)
  Usage: {% include "components/post_stats.html" with post=post %}
{% endcomment %}
<div class="post-stats-bar">
  <div class="flex items-center gap-1.5">
    <span class="flex items-center justify-center w-5 h-5 rounded-full brand-gradient text-white text-[10px] font-bold">&#9829;</span>
    <span>{{ post.total_likes }}</span>
  </div>
  <span>{{ post.total_comments }} comments</span>
</div>
