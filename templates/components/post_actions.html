{% comment %}
  Post action buttons (like, comment, save, share)
  Usage: {% include "components/post_actions.html" with post=post %}
{% endcomment %}
{% load static %}
<div class="flex items-center border-t border-[var(--border-light)] px-1 py-0.5">
  <button class="post-action-btn flex-1 justify-center post-action-like{% if user in post.reactions.all %} liked{% endif %}"
          data-post-id="{{ post.id }}">
    <svg class="w-5 h-5" fill="{% if user in post.reactions.all %}currentColor{% else %}none{% endif %}" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
    </svg>
    <span class="like-count">{{ post.total_likes }}</span>
  </button>
  <a href="{% url 'posts:post_detail' pk=post.id %}" class="post-action-btn flex-1 justify-center no-underline hover:no-underline">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
    </svg>
    Comment
  </a>
  <button class="post-action-btn flex-1 justify-center post-action-save" data-post-id="{{ post.id }}">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/>
    </svg>
    Save
  </button>
  <button class="post-action-btn flex-1 justify-center share-btn" data-post-id="{{ post.id }}" data-post-url="{{ post.get_absolute_url }}">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
    </svg>
    Share
  </button>
  <button class="post-action-btn justify-center report-btn ml-auto" data-post-id="{{ post.id }}" data-post-author="{{ post.author.id }}">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 21v-4m0 0V5a2 2 0 012-2h6.5l1 1H21l-3 6 3 6h-8.5l-1-1H5a2 2 0 00-2 2zm9-13.5V9m0 4.5h.01"/>
    </svg>
  </button>
</div>
