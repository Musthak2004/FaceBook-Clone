# ============================================================
# docker-compose.yml — Production-like stack
#   Web (Daphne ASGI) + PostgreSQL + Redis (Channels layer)
# ============================================================
version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: socialnet
      POSTGRES_USER: socialnet
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socialnet"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    environment:
      - DJANGO_SETTINGS_MODULE=social_network.settings
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - DATABASE_URL=postgres://socialnet:${DB_PASSWORD:-changeme}@db:5432/socialnet
      - REDIS_URL=redis://redis:6379/0
      - EMAIL_HOST=${EMAIL_HOST:-}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      - EMAIL_USE_TLS=True
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-noreply@socialnet.local}
      - PORT=8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
  static_data:
